name: Build and deploy Node.js app to Azure Web App - NeuroX

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        working-directory: neurox-nextjs
        run: npm install

      - name: Build Next.js app
        working-directory: neurox-nextjs
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy

          cp -r neurox-nextjs/.next/standalone/* deploy/
          mkdir -p deploy/.next
          cp -r neurox-nextjs/.next/static deploy/.next/static

          if [ -d neurox-nextjs/public ]; then cp -r neurox-nextjs/public deploy/public; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "NeuroX"
          slot-name: "Production"
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A2F0B92F4B4947B0B855B18AA203114E }}