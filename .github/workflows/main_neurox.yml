name: Build and deploy Node.js app to Azure Web App - NeuroX

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Inspect build output
        run: |
          echo "=== .next directory ==="
          ls -R .next || true

          echo "=== .next/standalone directory ==="
          ls -R .next/standalone || true

          echo "=== Searching for server.js ==="
          find .next -name server.js || true

      - name: Prepare deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy

          SERVER_PATH=$(find .next/standalone -name server.js | head -n 1)

          if [ -z "$SERVER_PATH" ]; then
            echo "ERROR: server.js not found in .next/standalone"
            exit 1
          fi

          APP_DIR=$(dirname "$SERVER_PATH")

          echo "Found standalone app at: $APP_DIR"

          cp -R "$APP_DIR"/. deploy/

          mkdir -p deploy/.next
          cp -R .next/static deploy/.next/static

          if [ -d public ]; then
            cp -R public deploy/public
          fi

          echo "=== Deploy package contents ==="
          ls -R deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Show downloaded artifact
        run: |
          echo "=== Downloaded Artifact ==="
          ls -R deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: NeuroX
          slot-name: Production
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A2F0B92F4B4947B0B855B18AA203114E }}