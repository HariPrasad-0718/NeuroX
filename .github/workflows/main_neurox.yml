name: Build and deploy Node.js app to Azure Web App - NeuroX

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Inspect build output
        run: |
          echo "=== .next/standalone ==="
          ls -R .next/standalone || true

      - name: Prepare deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy

          APP_DIR=".next/standalone/neurox-nextjs"

          if [ ! -f "$APP_DIR/server.js" ]; then
            echo "ERROR: standalone server.js not found"
            exit 1
          fi

          echo "Using standalone app directory:"
          echo "$APP_DIR"

          cp -R "$APP_DIR"/. deploy/

          mkdir -p deploy/.next
          cp -R .next/static deploy/.next/static

          if [ -d public ]; then
            cp -R public deploy/public
          fi

          echo "=== DEPLOY CONTENTS ==="
          ls -R deploy

      - name: Verify deployment package
        run: |
          echo "=== package.json ==="
          cat deploy/package.json

          echo "=== server.js ==="
          ls -la deploy/server.js

          echo "=== react-dom cjs ==="
          ls deploy/node_modules/react-dom/cjs | head || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Verify downloaded artifact
        run: |
          echo "=== Downloaded Artifact ==="
          ls -R deploy

          echo "=== package.json ==="
          cat deploy/package.json

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: NeuroX
          slot-name: Production
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A2F0B92F4B4947B0B855B18AA203114E }}