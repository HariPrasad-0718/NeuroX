name: Build and deploy Node.js app to Azure Web App - NeuroX

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== .next contents ==="
          ls -la .next

          echo "=== standalone contents ==="
          ls -la .next/standalone

      - name: Prepare deployment package
        run: |
          rm -rf deploy

          # Create required folders
          mkdir -p deploy/.next

          # Copy standalone server
          cp -r .next/standalone/* deploy/

          # Copy Next.js static assets
          cp -r .next/static deploy/.next/static

          # Copy public assets
          if [ -d public ]; then
            cp -r public deploy/public
          fi

          echo "=== DEPLOY CONTENTS ==="
          ls -R deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Show deploy folder
        run: ls -R deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "NeuroX"
          slot-name: "Production"
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A2F0B92F4B4947B0B855B18AA203114E }}